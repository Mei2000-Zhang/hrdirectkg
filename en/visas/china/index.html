<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>China Visa — tourist and business | AIS Visa Tarvel</title>
  <meta name="description" content="China visa for citizens of Kyrgyzstan: tourist and business. Forms, invitation, bookings, insurance, support. Bishkek." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mei2000-zhang.github.io/aisvisatravel/en/visas/china/" />

  <link rel="icon" type="image/x-icon" href="/aisvisatravel/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --text:#f6f7f9;
      --muted:rgba(246,247,249,.78);
      --glass: rgba(10,12,16,.50);
      --glass2: rgba(10,12,16,.88);
      --line:rgba(255,255,255,.12);
      --radius:18px;
      --hero-img: url("/aisvisatravel/ben.jpg");
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      overflow-x:hidden;
      line-height:1.55;
      background-image: var(--hero-img);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    a{color:inherit;text-decoration:none}
    .container{width:min(1140px, calc(100% - 32px)); margin:0 auto}

    .topbar{
      background:rgba(0,0,0,.45);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.10);
      z-index:70;
      position:relative;
    }

    .topbar .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 0;
      font-size:13.5px;
      text-shadow:0 2px 10px rgba(0,0,0,.55);
    }

    .lang{display:flex; gap:8px}

    .lang a{
      padding:4px 9px;
      border-radius:999px;
      opacity:.85;
    }

    .lang a.active{
      opacity:1;
      font-weight:800;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.12);
    }

    header{
      position:sticky;
      top:0;
      z-index:80;
      background:rgba(0,0,0,.28);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.10);
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
      white-space:nowrap;
      text-shadow:0 12px 40px rgba(0,0,0,.55);
    }

    .mark{
      width:32px;
      height:32px;
      border-radius:12px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 14px 40px rgba(0,0,0,.35);
    }

    .main-nav{
      display:flex;
      gap:22px;
    }

    .main-nav a{
      font-size:14px;
      font-weight:700;
      opacity:.9;
      position:relative;
    }

    .main-nav a.active{opacity:1}

    .main-nav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:0;
      height:2px;
      background:rgba(246,247,249,.85);
      transition:.2s;
    }

    .main-nav a:hover::after{width:100%}

    @media(max-width:980px){
      .main-nav{display:none}
    }

    .burger{
      width:46px;
      height:46px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.20);
      background:rgba(0,0,0,.18);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
    }

    .burger span{
      width:18px;
      height:2px;
      background:#f6f7f9;
      border-radius:2px;
    }

    .drawer-backdrop{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.60);
      z-index: 90;
    }

    .drawer{
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: min(460px, 88vw);
      background: var(--glass2);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255,255,255,.12);
      z-index: 100;
      transform: translateX(105%);
      transition: transform .25s ease;
      display:flex;
      flex-direction:column;
      box-shadow: -24px 0 70px rgba(0,0,0,.60);
    }

    .drawer.open{ transform: translateX(0); }

    .drawer-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 18px;
      border-bottom: 1px solid rgba(255,255,255,.10);
    }

    .drawer-close{
      width:42px;
      height:42px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
      color: var(--text);
      cursor:pointer;
    }

    .drawer-nav{
      padding: 10px;
      display:flex;
      flex-direction:column;
      gap:6px;
      overflow:auto;
    }

    .drawer-nav a{
      padding: 13px 12px;
      border-radius: 16px;
      border:1px solid transparent;
      color: rgba(246,247,249,.86);
      font-weight: 800;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .drawer-nav a:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.12);
      color: var(--text);
    }

    .drawer-cta{
      margin-top:auto;
      padding: 14px 14px 18px;
      border-top: 1px solid rgba(255,255,255,.10);
    }

    .drawer-cta .cta{
      display:block;
      text-align:center;
      padding: 14px 16px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      font-weight: 950;
      color: var(--text);
    }

    .drawer-cta .cta:hover{
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.24);
    }

    main.page{
      padding:48px 0 72px;
      position:relative;
    }

    main.page::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.25) 0%, rgba(0,0,0,.70) 60%, rgba(0,0,0,.85) 100%);
      z-index:-1;
    }

    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.25);
      font-weight:900;
      font-size:12px;
      letter-spacing:.08em;
    }

    h1{
      margin:16px 0 10px;
      font-size:clamp(28px,4vw,46px);
      text-shadow:0 14px 44px rgba(0,0,0,.6);
    }

    .lead{
      max-width:820px;
      color:var(--muted);
      font-size:16px;
    }

    footer{
      margin-top:28px;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.1);
      font-size:14px;
      color:var(--muted);
    }

    .wa{
      position:fixed;
      right:16px;
      bottom:16px;
      width:56px;
      height:56px;
      border-radius:50%;
      background: rgba(246,247,249,.92);
      display:grid;
      place-items:center;
      box-shadow:0 12px 26px rgba(0,0,0,.45);
      z-index:95;
      border:1px solid rgba(255,255,255,.18);
    }

    .wa svg{
      width:26px;
      height:26px;
      fill:#0b0b0c;
    }

    .ig{
      position:fixed;
      right:16px;
      bottom:84px;
      width:56px;
      height:56px;
      border-radius:50%;
      background: rgba(246,247,249,.92);
      display:grid;
      place-items:center;
      box-shadow:0 12px 26px rgba(0,0,0,.45);
      z-index:95;
      border:1px solid rgba(255,255,255,.18);
    }

    /* FIX Instagram icon */
    .ig svg{
      width:26px;
      height:26px;
      fill:#0b0b0c;
    }

  </style>
</head>
